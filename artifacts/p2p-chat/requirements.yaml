packages:
  "framer-motion": "For smooth layout transitions and panel sliding animations"
  "date-fns": "For precise timestamp formatting in the protocol inspector and chat"
  "clsx": "For conditional tailwind class merging"
  "tailwind-merge": "For conditional tailwind class merging"
  "uuid": "For generating unique local message IDs"

images: []

notes:
  - "The app uses a dark 'hacker/technical' theme with custom neon color variables."
  - "WebSockets (ws:// or wss://) on the current host at /ws are used for signaling only (peer discovery, SDP/ICE relay)."
  - "Actual chat messages flow through WebRTC data channels (group-chat, direct-message) for true peer-to-peer communication."
  - "Messages are ephemeral - stored in-memory only, disappear when browser closes. No server persistence."
  - "Uses RTCPeerConnection with two data channels per peer: 'group-chat' for room broadcasts, 'direct-message' for 1-on-1 DMs."
  - "Room and peer management is fully client-side. STUN servers handle connectivity on local networks."

