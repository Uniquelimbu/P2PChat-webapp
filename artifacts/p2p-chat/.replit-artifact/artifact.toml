kind = "web"
previewPath = "/"
title = "P2P Local Network Chat"
version = "1.0.0"
id = "artifacts/p2p-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20088

[services.development]
run = "pnpm --filter @workspace/p2p-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/p2p-chat", "run", "build" ]
publicDir = "artifacts/p2p-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20088"
BASE_PATH = "/"
